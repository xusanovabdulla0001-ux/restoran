<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oshxona Ekrani</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#141414;--card:#1c1c1c;--border:#2a2a2a;--text:#f0f0f0;--muted:#888;--accent:#f5c842;--green:#4caf72;--red:#e05252;--blue:#5b9cf6;--orange:#f0883e}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700;color:var(--accent)}
.counter-badge{background:var(--red);color:#fff;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700}
.ping{animation:ping .6s ease-in-out infinite alternate}
@keyframes ping{from{transform:scale(1)}to{transform:scale(1.08)}}
.main{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;align-items:start}
.order-card{border-radius:14px;border:2px solid var(--border);overflow:hidden;transition:all .2s}
.order-card.yangi{border-color:var(--red);animation:flash 1s ease-in-out 3}
@keyframes flash{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(224,82,82,.4)}}
.order-card.tayyorlanmoqda{border-color:var(--orange)}
.order-card.tayyor{border-color:var(--green);opacity:.6}
.card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.card-header.yangi{background:#2e0e0e}
.card-header.tayyorlanmoqda{background:#2e1c00}
.card-header.tayyor{background:#0b2e18}
.order-id{font-size:18px;font-weight:800}
.order-meta{font-size:12px;color:var(--muted);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.badge.red{background:rgba(224,82,82,.15);color:var(--red);border:1px solid rgba(224,82,82,.3)}
.badge.orange{background:rgba(240,136,62,.15);color:var(--orange);border:1px solid rgba(240,136,62,.3)}
.badge.green{background:rgba(76,175,114,.15);color:var(--green);border:1px solid rgba(76,175,114,.3)}
.items-list{padding:12px 16px;background:var(--card)}
.item-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-nom{font-size:15px;font-weight:600}
.item-qty{font-size:20px;font-weight:800;color:var(--accent);min-width:36px;text-align:right}
.card-footer{padding:12px 16px;background:var(--surface);display:flex;gap:8px}
.action-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.action-btn:active{transform:scale(.97)}
.btn-boshlash{background:var(--orange);color:#000}
.btn-tayyor{background:var(--green);color:#000}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;grid-column:1/-1}
.empty-icon{font-size:60px}
.empty-txt{font-size:18px;color:var(--muted)}
.pulse{width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">👨‍🍳 OSHXONA</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px"><span class="pulse"></span>Real vaqtda yangilanadi</div>
  </div>
  <div>
    <div class="counter-badge" id="yangi-count">0 yangi</div>
    <div style="font-size:11px;color:var(--muted);text-align:right;margin-top:4px" id="clock"></div>
  </div>
</header>
<div class="main" id="main"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyB2LY4S_Eh1vAMKJ74q0K2yas9BPUv2hLo",authDomain:"shaffof-menyu.firebaseapp.com",databaseURL:"https://shaffof-menyu-default-rtdb.firebaseio.com",projectId:"shaffof-menyu",storageBucket:"shaffof-menyu.firebasestorage.app",messagingSenderId:"429591005236",appId:"1:429591005236:web:1a4f0d94facce07665a261"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let rid=new URLSearchParams(location.search).get('rid');
let prevIds=new Set();

auth.onAuthStateChanged(user=>{
  if(!user){location.href='login.html';return;}
  if(!rid){
    db.ref('foydalanuvchilar/'+user.uid).once('value',snap=>{
      let d=snap.val();
      if(d){rid=d.rid;initData();}
      else location.href='login.html';
    });
  } else initData();
});

function initData(){
  db.ref('restoranlar/'+rid+'/buyurtmalar').on('value',snap=>{
    let val=snap.val();
    let buyurtmalar=val?Object.values(val).filter(b=>b.holat!=='yetkazildi'):[];
    let yangi=buyurtmalar.filter(b=>b.holat==='yangi');
    document.getElementById('yangi-count').textContent=yangi.length+' yangi';
    document.getElementById('yangi-count').className='counter-badge'+(yangi.length>0?' ping':'');
    let currentIds=new Set(buyurtmalar.map(b=>b.id));
    let hasNew=[...currentIds].some(id=>!prevIds.has(id));
    if(hasNew&&prevIds.size>0)playSound();
    prevIds=currentIds;
    let el=document.getElementById('main');
    if(!buyurtmalar.length){
      el.innerHTML='<div class="empty"><div class="empty-icon">✓</div><div class="empty-txt">Barcha buyurtmalar bajarildi</div></div>';
      return;
    }
    let sorted=[...buyurtmalar.filter(b=>b.holat==='yangi'),...buyurtmalar.filter(b=>b.holat==='tayyorlanmoqda'),...buyurtmalar.filter(b=>b.holat==='tayyor')];
    el.innerHTML=sorted.map(b=>`
      <div class="order-card ${b.holat}">
        <div class="card-header ${b.holat}">
          <div><div class="order-id">${b.id}</div><div class="order-meta">Stol ${b.stol} · ${b.vaqt}</div></div>
          <span class="badge ${b.holat==='yangi'?'red':b.holat==='tayyorlanmoqda'?'orange':'green'}">${b.holat==='yangi'?'🔴 Yangi':b.holat==='tayyorlanmoqda'?'🟠 Tayyorlanmoqda':'✅ Tayyor'}</span>
        </div>
        <div class="items-list">${b.items.map(i=>`<div class="item-row"><span class="item-nom">${i.nom}</span><span class="item-qty">×${i.qty}</span></div>`).join('')}</div>
        <div class="card-footer">
          ${b.holat==='yangi'?`<button class="action-btn btn-boshlash" onclick="boshla('${b.id}')">🍳 Tayyorlashni boshlash</button>`:''}
          ${b.holat==='tayyorlanmoqda'?`<button class="action-btn btn-tayyor" onclick="tayyor('${b.id}')">✅ Tayyor!</button>`:''}
          ${b.holat==='tayyor'?'<div style="flex:1;text-align:center;color:var(--green);font-weight:700">✓ Ofitsiant kutmoqda</div>':''}
        </div>
      </div>`).join('');
  });
}

function boshla(id){db.ref('restoranlar/'+rid+'/buyurtmalar/'+id).update({holat:'tayyorlanmoqda'});}
function tayyor(id){
  db.ref('restoranlar/'+rid+'/buyurtmalar/'+id).update({holat:'tayyor'});
  db.ref('restoranlar/'+rid+'/buyurtmalar/'+id).once('value',snap=>{
    let b=snap.val();
    if(b) db.ref('restoranlar/'+rid+'/stollar/'+b.stol).update({holat:'tayyor'});
  });
}
function playSound(){try{let ctx=new AudioContext();[440,550,660].forEach((f,i)=>{let o=ctx.createOscillator();let g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(.3,ctx.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.15+.2);o.start(ctx.currentTime+i*.15);o.stop(ctx.currentTime+i*.15+.2);});}catch(e){}}
function clock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('uz',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(clock,1000);clock();
</script>
</body>
</html>
